hdr_support:
  title: "HDR output support"
  subtitle: "This baby can take temperatures up to 1&#x2060;,&#x2060;000 nits!"
  text: |
    Your Godot project just got a huge upgrade in range and color with high dynamic range (HDR) output support. Imagine vibrant colors, and more artistic control over bloom, exposure, and glow! 

    HDR originally comes from photography, where multiple photos are taken from the same position at different exposures. When the photos are combined, you’re able to capture both the bright and dark areas of the image, achieving a greater dynamic range. 

    In Godot 4.7, HDR output has been made possible for Windows, macOS, iOS, visionOS, and Linux (Wayland). Output support for HDR allows for more fine-tuned customization of exposure and glow. You also have access to ranges and colors that were simply not possible before, with higher detail especially in bright areas. 2D and 3D content can also be mixed in the same scene while keeping a consistent brightness between the two!

    Read the detailed writeup on [how HDR output was implemented in Godot](https://godotengine.org/article/hdr-output-arrives-in-godot-4-7/) to know more.
  read_more: "https://github.com/godotengine/godot/pulls?q=is%253Apr+is%253Amerged+94496+102987+106814"
  contributors:
    - name: "Allen Pestaluky"
      link: "https://github.com/allenwp"
    - name: "Josh Jones"
      link: "https://github.com/DarkKilauea"
    - name: "alvinhochun"
      link: "https://github.com/alvinhochun"
    - name: "Stuart Carnie"
      link: "https://github.com/stuartcarnie"
    - name: "ArchercatNEO"
      link: "https://github.com/ArchercatNEO"
  compare:
    before_image: screenshot-sdr.avif
    after_image: screenshot-hdr.avif
    before_text: SDR
    after_text: HDR
drawable_textures:
  title: "Drawing on a texture never been this much easy"
  subtitle: "There are no mistakes here, only happy accidents."
  text: |
    After a long wait, we’re excited to share that it’s possible to easily draw on a texture! 

    Previously, there were some hacky solutions through using the Viewpoint, but it was limited and costly to handle more complex tasks. For those who were comfortable dissecting and getting into the guts of the engine, RenderingDevice allowed for an even more complex solution. 

    However, now we have something much more accessible, a solution in the form of: ✨ [`DrawableTexture2D`](https://docs.godotengine.org/en/4.7/classes/class_drawabletexture2d.html) ✨. It’s a simple API layer that abstracts away all the technical noise and gives users of all skill levels an approachable way to do the thing: to draw on textures!
  read_more: "https://github.com/godotengine/godot/pull/105701"
  contributors:
    - name: "Colin O’Rourke"
      link: "https://github.com/ColinSORourke"
  media_author:
    name: "Colin O’Rourke"
    link: "https://github.com/ColinSORourke"
  media: "drawable_textures.webm"
asset_store_update:
  title: "Exit the Asset Library, Enter the Asset Store"
  subtitle: "Got a selection of good things, stranger!"
  text: |
    The Asset Library has been due for a refresh for a while, and with the new Asset Store and API approaching on the horizon, this was the perfect opportunity to give it some extra care and attention.

    The new update adds some changes to make browsing assets easier and more enjoyable! We’ve polished how asset items are displayed and now you can even zoom asset preview images. But, maybe that doesn’t catch your eye, what if we were to tell you, you can now see the asset ratings. Were you lost in a field of endless assets? Unsure how to navigate among the field of tall assets? Well, look no further, now from right within the store.

    Behind the scenes, we have also introduced threading. This means the Asset Store can perform certain tasks in the background without blocking the editor’s main user interface. That’s pretty cool. Now while you’re exploring your field, of more organized than before, assets, you’ll also know there’s someone paving a path and clearing brush quietly in the background, making it that much easier for you to get the lay of the land.

    Be sure to read our ["Introducing the Godot Asset Store"](https://godotengine.org/article/introducing-the-godot-asset-store) blog post for more details.
  read_more: "https://github.com/godotengine/godot/pull/112992"
  contributors:
    - name: "Michael Alexsander"
      link: "https://github.com/YeldhamDev"
  media: "asset-store-editor.webp"
shader_previews:
  title: "Inline previews of text-based shader operations"
  subtitle: "I don’t even see the code. All I see is fresnel, albedo, occlusion."
  text: |
    We’ll keep going with this field imagery. Imagine you’re in a field. In the far distance, you see a lone developer, hunched over their laptop, you intuitively yell through the tall grass, “`VEC2 V4 = UV;`”!! The developer victoriously pumps their hand in the air, but in your heart you know you’ll need to see the results yourself. You tread through the field, and at last, you arrive, gasping for air, you look over the lone developer’s shoulder to witness your creation. 

    With inline text shader previews, the treacherous journey is over. 

    Right as you type, `vec2 v4 = UV;` you can now preview Godot text shaders within the editor in real-time. Back in the day, you would have needed to compile a shader and view it separately in the workspace. But thanks to the long-awaited quality-of-life addition of the text shader editor, you will actually be able to preview the shader and what it will do, in the moment, as you’re working on the shader from within the editor!
  read_more: "https://github.com/godotengine/godot/pulls?q=is%253Apr+is%253Amerged+117726+118865"
  contributors:
    - name: "Yuri Rubinsky"
      link: "https://github.com/Chaosus"
    - name: "Cashew OldDew"
      link: "https://github.com/cashew-olddew"
    - name: "vaner"
      link: "https://github.com/vaner-org"
  media_author:
    name: "Yuri Rubinsky"
    link: "https://github.com/Chaosus"
  media: "inline-text-shader-previews.webp"
rect_area_light:
  title: "`AreaLight3D`, a new node for rectangular light sources"
  subtitle: "Do you think light can gloom even on a battlefield?"
  text: |
    The soft radiating glow off a humming TV screen, an illuminated billboard in a vibrant cityscape, or an ominous light through a frosted window is now achievable with rectangle area light.

    You no longer need to use an emissive material combined with Global Illumination to simulate a glowing area. By leveraging the new `AreaLight3D`, it is now possible to render real-time light from a rectangle in 3D space. Rectangle area lights can create softer shadows and more realistic reflections for your scenes.
  read_more: "https://github.com/godotengine/godot/pull/108219"
  contributors:
    - name: "Emil Dobetsberger"
      link: "https://github.com/CookieBadger"
  media_author:
    name: "PassiveStar"
    link: "https://github.com/passivestar"
  media: "arealightfhd_small.webm"
android_gabe:
  title: "Creating games entirely on Android"
  subtitle: "The power is in the palm of your hands."
  text: |
    Developing on Android and XR has been possible for a while, and with Godot 4.7, developers now get the ability to export and publish their games as well thanks to the Godot Android Build Environment (GABE).

    GABE is a companion app to the Godot Android editor that developers can download to support their development efforts.

    Godot 4.7 sees some QOL improvements to better integrate and leverage GABE on Android devices.
  read_more: "https://godotengine.org/article/gabe-stable-release/"
  contributors:
    - name: "Anish Kumar"
      link: "https://github.com/syntaxerror247"
    - name: "David Snopek"
      link: "https://github.com/dsnopek"
    - name: "Fredia Huya-Kouadio"
      link: "https://github.com/m4gr3d"
  media: android_gabe.webp
  # media_author:
  #   name: "PassiveStar"
  #   link: "https://github.com/passivestar"
  # media: "arealightfhd_small.webm"
nearest_neighbor_scaling:
  title: "New nearest-neighbor scaling option for viewports"
  subtitle: "Draw me like one of your PS1 girls."
  text: |
    For 3D games with a retro art style, or when you want to maximize crispness when using a low resolution scale for performance reasons, you can now opt into nearest-neighbor filtering for 3D rendering. Like the existing 3D resolution scale options, this does not affect 2D rendering. Performance is roughly identical to bilinear filtering.

    For best results, the **Scaling 3D > Scale** project setting should be set to a value that corresponds to an integer scaling factor. These factors include `0.5` (½ resolution), `0.333` (⅓ resolution), and `0.25` (¼ resolution). This ensures all pixels are evenly scaled, avoiding distortion.
  read_more: "https://github.com/godotengine/godot/pull/79731"
  contributors:
    - name: "Hugo Locurcio"
      link: "https://github.com/Calinou"
  media_author:
    name: "Hugo Locurcio"
    link: "https://github.com/Calinou"
  compare:
    before_image: nearest.webp
    after_image: bilinear.webp
    before_text: Nearest
    after_text: Bilinear
copy_past_properties:
  title: "Copy and paste sections of the inspector"
  subtitle: "Duplicate data. data. data. data."
  text: |
    If you ever wanted to quickly copy inspector properties from one node to another, you’re in luck!

    You’re now able to copy rows of properties by right-clicking their category or group. Pasting values is done in the same way.
  read_more: "https://github.com/godotengine/godot/pull/111469"
  contributors:
    - name: "Raphaël Daubelcour"
      link: "https://github.com/Raftatul"
  media_author:
    name: "Raphaël Daubelcour"
    link: "https://github.com/Raftatul"
  media: editor-copy-paste-category-properties.webm
tween_await:
  title: "Tweens can now wait for signals"
  subtitle: "Stop… _signal time!_"
  text: |
    Tweens have always been difficult to work with at scale, especially when dealing with time based events or events that rely on external factors. With the new [`Tween.tween_await()`](https://docs.godotengine.org/en/4.7/classes/class_tween.html#class-tween-method-tween-await) method, it’s now a thing of the past.

    It is now possible to pause a tween until a specific signal is triggered. This can be especially helpful when designing dialogue and cutscenes.
  read_more: "https://github.com/godotengine/godot/pull/79712"
  contributors:
    - name: "Tomasz Chabora"
      link: "https://github.com/KoBeWi"
  media: tween_await.webm
virtual_joystick:
  title: "Built-in virtual joystick"
  subtitle: "Break in case of emergency."
  text: |
    Virtual joysticks are a staple of mobile gaming. From twin-stick shooters to 3D platformers, they’re featured in a large number of mobile games. However, in Godot, developers had to create their own virtual joystick system, or use an add-on that implements one.

    This is no longer needed as Godot now provides its own VirtualJoystick node, complete with 3 operation modes: fixed, dynamic, following. Coupled with built-in theming abilities, this greatly speeds up the mobile development process.
  read_more: "https://github.com/godotengine/godot/pull/110933"
  contributors:
    - name: "Kazox61"
      link: "https://github.com/Kazox61"
  media_author:
    name: "Kazox61"
    link: "https://github.com/Kazox61"
  media: virtual-joystick.webm
mesh_library_update:
  title: "Introducing the `MeshLibrary` editor"
  subtitle: "It’s like a librarian, minus the shushing."
  text: |
    The [`GridMap`](https://docs.godotengine.org/en/4.7/classes/class_gridmap.html) node uses a [`MeshLibrary`](https://docs.godotengine.org/en/4.7/classes/class_meshlibrary.html) resource to source the tiles that can be placed. Previously, editing a `MeshLibrary` resource had to be done entirely in the inspector, which made it tedious to work with.

    There is now a dedicated `MeshLibrary` editor, similar to the [`TileSet`](https://docs.godotengine.org/en/4.7/classes/class_tileset.html) editor in 2D. This greatly streamlines the process of adding and editing tiles for use in a `GridMap` node.
  read_more: "https://github.com/godotengine/godot/pull/117376"
  contributors:
    - name: "Michael Alexsander"
      link: "https://github.com/YeldhamDev"
  media: meshlibrary-editor.webp
tree_drag_and_drop_update:
  title: "Improved Tree drag and drop"
  subtitle: "Easy as one-two-tree!"
  text: |
    It’s now way more intuitive (and thus easier) to reorder items in [`Tree`](https://docs.godotengine.org/en/4.7/classes/class_tree.html) nodes, thanks to the new drop position indicator.

    You’ll certainly appreciate this change when reordering your scene nodes in the editor. (Remember, Godot eats its own dog food!)
  read_more: "https://github.com/godotengine/godot/pull/112993"
  contributors:
    - name: "vaner"
      link: "https://github.com/vaner-org"
  media: tree_drag_and_drop_update.webm
  poster: tree_drag_and_drop_update_poster.webp
export_template_dialog_update:
  title: "Only download the templates you need"
  subtitle: "You must download additional platforms."
  text: |
    A common issue with Godot’s export system is that until now, you had to download export templates for all platforms whenever you wanted to export your project for a single platform. This led to large downloads, which not only made for a slower experience, but could also incur additional charges for people on a metered connection.

    This is now remedied by the new export template downloader, which can download export templates for individual platforms or even specific architectures. This can reduce export template download sizes by a large factor when you only need to export to a single platform.
  read_more: "https://github.com/godotengine/godot/pull/117072"
  contributors:
    - name: "Tomasz Chabora"
      link: "https://github.com/KoBeWi"
  media_author:
    name: "Tomasz Chabora"
    link: "https://github.com/KoBeWi"
  media: export_template_dialog_update.mp4
scene_painter_tool:
  title: "2D scene painter"
  subtitle: "Use this to paint something spectacular!"
  text: |
    Godot already offers a way to lay out scenes quickly in 2D using TileMaps and scene tiles. However, this requires some setup for projects not already using TileMaps. It is also restricted to a grid pattern, and scene tiles are not considered actual nodes that can be directly modified within the editor.

    To remedy these limitations, Godot now offers a scene painter tool in 2D. This can be used to quickly scatter things like foliage or decorations in a 2D scene.

    While this tool is currently only available in the 2D editor, it may be offered in the 3D editor in a future release.
  read_more: "https://github.com/godotengine/godot/pull/109360"
  contributors:
    - name: "Dexter"
      link: "https://github.com/DexterFstone"
  media_author:
    name: "Dexter"
    link: "https://github.com/DexterFstone"
  media: scene_painter_tool.mp4
documentation_layout_update:
  title: "Improved appearance of the built-in help"
  subtitle: "But just TAKE A LOOK AT THIS!"
  text: |
    We made the built-in documentation layout look more closely to the online documentation one. It is now cleaner and more readable. Expect to see improved readability for docs in-engine.
  read_more: "https://github.com/godotengine/godot/pull/107597"
  contributors:
    - name: "Danil Alexeev"
      link: "https://github.com/dalexeev"
  media_author:
    name: "Danil Alexeev"
    link: "https://github.com/dalexeev"
  compare:
    before_image: documentation_layout_update_before.webp
    after_image: documentation_layout_update_after.webp
    before_text: Before
    after_text: After
remote_scene_inspector_groups_folding:
  title: "Fold groups and subgroups in the Remote Scene Inspector"
  subtitle: "Quick! Hide!"
  text: |
    Previously, it was possible to fold property groups and subgroups in the local inspector, but not in the remote inspector. This owes to the fact that the remote inspector is a separate implementation from the local inspector.

    Support for folding groups and subgroups in the remote scene inspector has been implemented. Both local and remote inspectors now support folding property groups the same way, which makes for a more seamless, consistent UX.
  read_more: "https://github.com/godotengine/godot/pull/117357"
  contributors:
    - name: "Jayden Sipe"
      link: "https://github.com/jaydensipe"
  media_author:
    name: "Jayden Sipe"
    link: "https://github.com/jaydensipe"
  media: remote_scene_inspector_groups_folding.webm
gdextensions_view_inside_settings:
  title: "Project GDExtensions are now displayed in the project settings"
  subtitle: "GDExtensions, Assemble!"
  text: |
    Since their introduction and by their nature, GDExtensions are automatically loaded by the engine on initialization. There was unfortunately no way to know exactly which project extensions were actually present in a project, except by manually locating the project’s `.gdextension` files.

    With this new feature, the project settings window has a section about the detected GDExtensions.
  read_more: "https://github.com/godotengine/godot/pull/118063"
  contributors:
    - name: "Aaron Franke"
      link: "https://github.com/aaronfranke"
  media: gdextensions_view_inside_settings.webp
ruler_3d_components:
  title: "New vector measurement tool for the 3D editor ruler"
  subtitle: "The ruler’s got new tricks."
  text: |
    The 3D editor’s ruler tool can now display lengths for each axis. This makes it easier to measure multiple lengths in one go, such as measuring the size of a rectangular region in the 3D world.

    To make use of this feature, switch to the Ruler mode at the top of the 3D editor, hold down <kbd><kbd>Shift</kbd></kbd>, then press and hold the left mouse button to draw a line. When <kbd><kbd>Shift</kbd></kbd> is held, individual vector components are displayed.
  read_more: "https://github.com/godotengine/godot/pull/106785"
  contributors:
    - name: "Robert Yevdokimov"
      link: "https://github.com/ryevdokimov"
  media_author:
    name: "Robert Yevdokimov"
    link: "https://github.com/ryevdokimov"
  media: editor-3d-ruler-1.webp
collapse_animation_groups:
  title: "Animation editor nodes are now collapsable"
  subtitle: "Free your mind."
  text: |
    This feature is a blessing for animation editor power users. As soon as an animation node tracks multiple nodes, it’s easy to become overwhelmed scrolling through tracks to find the ones you need to edit.

    Collapsing unneeded nodes should relieve the tension. Especially since you can see an aggregate representation of the collapsed animation keys.
  read_more: "https://github.com/godotengine/godot/pulls?q=is%253Apr+is%253Amerged+113479+117321"
  contributors:
    - name: "Malcolm Anderson"
      link: "https://github.com/Meorge"
  media_author:
    name: "Malcolm Anderson"
    link: "https://github.com/Meorge"
  media: collapse_animation_groups.webm
path3d_snap:
  title: "`Path3D` points can now snap to colliders"
  subtitle: "Anchor up"
  text: |
    Ever wondered why moving [`Path3D`](https://docs.godotengine.org/en/4.7/classes/class_path3d.html) points never seemed to snap where you wanted them to? That’s because they snap to the camera plane by default, which is essentially an imaginary flat plane at a fixed distance from the camera.

    We now added an option to snap path points on colliders instead.
  read_more: "https://github.com/godotengine/godot/pull/102085"
  contributors:
    - name: "Gustavo Jaruga Cruz"
      link: "https://github.com/GustJc"
  media_author:
    name: "Gustavo Jaruga Cruz"
    link: "https://github.com/GustJc"
  media: path3d_snap.webm
display_enum_remote_tree:
  title: "Remote tree inspector now properly display non-exported enum variables"
  subtitle: "We could enumerate the benefits all day long if we really wanted."
  text: |
    Prior to 4.7, the remote tree inspector had no way to distinguish normal integer variables from variables that hold a value from an enum. That’s because variable hint strings were only attributed to exported variables.

    We now fixed this, and the remote tree inspector now shows the enum name instead of its obscure integer value.
  read_more: "https://github.com/godotengine/godot/pull/115705"
  contributors:
    - name: "Danil Alexeev"
      link: "https://github.com/dalexeev"
  media: display_enum_remote_tree.webp
picture_in_picture:
  title: "Add support for picture-in-picture"
  subtitle: "What is this? A game for ants?"
  text: |
    [Picture-in-picture](https://en.wikipedia.org/wiki/Picture-in-picture) (PIP), it’s only good to continue watching videos while doing something else on your phone, right? Think again!

    With the introduction of PIP, you can render your game inside one of these little boxes. This is perfect for media players built using Godot, or for games that don’t require player input often or during a long cutscene. It enables players to keep playing while reading their emails or keeping up with their friends.

    While it’s only available on the Android platform for now, this feature will hopefully make its way to other platforms soon.
  read_more: "https://github.com/godotengine/godot/pull/114505"
  contributors:
    - name: "Fredia Huya-Kouadio"
      link: "https://github.com/m4gr3d"
  media_author:
    name: "Fredia Huya-Kouadio"
    link: "https://github.com/m4gr3d"
  media: picture_in_picture.webm
  poster: picture_in_picture_poster.webp
control_transform_offset:
  title: "Add transform offset to `Control` nodes"
  subtitle: "Transform the way you design GUIs."
  text: |
    One of the most long-awaited features in Godot’s GUI system is to be able to translate, rotate, or scale a Control node without it affecting the rest of the container. This is most notably used for animation purposes, so that buttons can smoothly slide into view or fade away with a scale change.

    However, Godot’s various Container nodes apply the position, rotation, and scale to their children, which means any changes made to the children’s transform is lost when the container is sorted again (which occurs when children are added, removed, or moved in the scene tree). The new transform offset properties aim to address this limitation in a self-contained manner, similar to the `transform` property in CSS.

    You can choose whether the transform offset affects mouse input. By default, transform offset is purely visual, which means there is no risk of buttons losing their hover status after being transformed.
  read_more: "https://github.com/godotengine/godot/pull/87081"
  contributors:
    - name: "Timo Schwarzer"
      link: "https://github.com/timoschwarzer"
  media_author:
    name: "Timo Schwarzer"
    link: "https://github.com/timoschwarzer"
  media: control_transform_offset.webm
  poster: control_transform_offset_poster.webp
popup_search:
  title: "Filter out long `PopupMenu` items with a search bar"
  subtitle: "Cut the chase."
  text: |
    Some features in Godot such as choosing a new class for a [`Resource`](https://docs.godotengine.org/en/4.7/classes/class_resource.html) property or selecting a language spawns tall dialogs with hundreds of options to choose from. While incremental search exists (typing some letters to highlight the first match), it’s difficult to discover and is not usable on a touch screen.

    [`PopupMenu`](https://docs.godotengine.org/en/4.7/classes/class_popupmenu.html) now supports optionally showing a search dialog at the top, making this functionality much easier to discover. On top of that, this also sidesteps the limitation on incremental search delay: you can take as much time as you want to type the desired search query.
  read_more: "https://github.com/godotengine/godot/pull/114236"
  contributors:
    - name: "Alexander Streng"
      link: "https://github.com/warriormaster12"
  media: popup_search.webp
text_label_image_scale:
  title: "Font-size aware `RichTextLabel` images"
  subtitle: "With big fonts requires big images."
  text: |
    While [`RichTextLabel`](https://docs.godotengine.org/en/4.7/classes/class_richtextlabel.html) offers a way to adjust font and image sizes, you still need to manually set the size of images to match the text size.

    Thanks to this new feature, you can now resize images relative to the font size automatically. For example, `[font_size=40]Example: img height=1em]example.png[/img][/font_size]` will render the image `example.png` at a size that matches the parent font size.
  read_more: "https://github.com/godotengine/godot/pull/112617"
  contributors:
    - name: "Malcolm Anderson"
      link: "https://github.com/Meorge"
  media_author:
    name: "Malcolm Anderson"
    link: "https://github.com/Meorge"
  media: text_label_image_scale.webp
android_window_resize:
  title: "Allow moving and resizing the embedded game window"
  subtitle: "What if I really want to create a game for ants?"
  text: |
    When developing a game, it’s important to ensure it looks good across a wide range of devices. With so many screen sizes and aspect ratios on the market, testing different layouts is essential.

    Desktop users have been able to resize the game window to quickly test how their games behave under different aspect ratios. We are now bringing the same flexibility to the Android Editor.

    The embedded game window can now be freely moved and resized, making it possible to test your game across different aspect ratios directly on your Android device.
  read_more: "https://github.com/godotengine/godot/pull/118417"
  contributors:
    - name: "Anish Kumar"
      link: "https://github.com/syntaxerror247"
  media_author:
    name: "Anish Kumar"
    link: "https://github.com/syntaxerror247"
  media: android_window_resize.webm
  poster: android_window_resize_poster.webp
one_way_collision_direction:
  title: "One-way collision support for `CollisionShape2D`"
  subtitle: "A one-way ticket for 2D platformers."
  text: |
    Creating one-way collisions for your platformers (and more!) is now easier than ever! With this new `one_way_collision_direction` property of `CollisionShape2D`, you’re now able to set the one way collision direction to any direction, relative and local to the shape.

    Previously, it was assumed that the one-way direction was locally up relative to the `CollisionShape2D` shape. People resorted to changing the shape itself in order to edit the one-way direction. This painful workaround is no longer needed.

    You can even make the one-way direction global (making the one-way direction constant) even if the collision shape itself rotates, using `global_transform.basis_xform_inv()`.
  read_more: "https://github.com/godotengine/godot/pull/104736"
  contributors:
    - name: "szunami"
      link: "https://github.com/szunami"
  media_author:
    name: "szunami"
    link: "https://github.com/szunami"
  media: one_way_collision_direction.webm
  poster: one_way_collision_direction_poster.webp
clearcoat_update:
  title: "Clearcoat improvements and fixes"
  subtitle: "~~Rip and tear!~~ Rise and shine!"
  text: |
    The previous implementation of clearcoat in [`BaseMaterial3D`](https://docs.godotengine.org/en/latest/classes/class_basematerial3d.html) had several issues, such as not implementing energy conservation. Sky reflections and reflection probes were also not taken into account.

    The improvements and fixes made to clearcoat rendering bring it closer to [the reference Disney PBR model](https://disneyanimation.com/publications/physically-based-shading-at-disney/). This makes clearcoat a better fit for materials like car paint.
  read_more: "https://github.com/godotengine/godot/pull/111464"
  contributors:
    - name: "Alfonso Grimaldo"
      link: "https://github.com/LiveTrower"
  media_author:
    name: "MinghauLoh (3D Model)"
    link: "https://sketchfab.com/minghau"
  compare:
    before_image: clearcoat_before.webp
    after_image: clearcoat_after.webp
    before_text: Before
    after_text: After
