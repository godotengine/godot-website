wayland_touch_support:
  title: "Initial touch support for Wayland"
  subtitle: "U Can~~’t~~ Touch This"
  text: |
    While touch support was available on Linux/*BSD using [X11](https://en.wikipedia.org/wiki/X_Window_System), it wasn’t the case when using the newer [Wayland protocol](https://en.wikipedia.org/wiki/Wayland_(protocol)) introduced in [4.3](https://godotengine.org/releases/4.3/#display-wayland-support). Well, until now.

    While more complex touch events still need to be implemented (pan and scale gestures, long press to right click on Android), you are now able to drag windows and push buttons with your fingers.
  read_more: "https://github.com/godotengine/godot/pull/113886"
  contributors:
    - name: "deralmas"
      link: "https://github.com/deralmas"
  media_author:
    name: "Ricardo Subtil"
    link: "https://github.com/rsubtil"
  media: wayland_touch_support.webm
  poster: wayland_touch_support_poster.webp
particles3d_scale_and_rotation:
  title: "3D particles scale and rotation can now be tweaked"
  subtitle: "Stretch and squash."
  text: |
    Make the particle system of your dreams! You can now create particles that scale and rotate. It’s an easy way to add more oompf to your animations.
  read_more: "https://github.com/godotengine/godot/pull/112447"
  contributors:
    - name: "QbieShay"
      link: "https://github.com/QbieShay"
  media: particles3d_scale_and_rotation.webm
  poster: particles3d_scale_and_rotation_poster.webp
vertex_snap:
  title: "3D vertex snapping"
  subtitle: "On point."
  text: |
    Placing meshes in a scene in the Godot editor used to be tedious. There wasn’t any way to tell it to place the edge of a level mesh flush of the tip of the one already present.

    But now, when holding the new Vertex Snap shortcut, the editor will highlight the nearest vertex on the selected node’s geometry. This selection can then be clicked and dragged to other vertices on other meshes.
  read_more: "https://github.com/godotengine/godot/pull/117380"
  contributors:
    - name: "Robert Yevdokimov"
      link: "https://github.com/ryevdokimov"
  media_author:
    name: "Robert Yevdokimov"
    link: "https://github.com/ryevdokimov"
  media: vertex_snap.webm
  poster: vertex_snap_poster.webp
ignore_joypad:
  title: "Ignore controller events when your game is unfocused"
  subtitle: "Just ignore them."
  text: |
    Operating systems handle gamepad input differently from keyboard and mouse input, as gamepad input is sent even when the window is unfocused. While this can be beneficial in some situations, it can lead to unintended inputs, potentially leading to accidentally exiting a game in the worst case.

    By enabling the **Input Devices > Joypads > Ignore Joypad on Unfocused Application** project setting, you can now make Godot ignore gamepad input unless the window is focused. This setting is *disabled by default* to preserve existing behavior.
  read_more: "https://github.com/godotengine/godot/pull/115119"
  contributors:
    - name: "Nintorch"
      link: "https://github.com/Nintorch"
  media: ignore_joypad.webp
property_list_helper_documentation:
  title: "Dynamically generated properties, such as menu items, are now documented"
  subtitle: "Where no one has gone before."
  text: |
    Dynamic properties generated by [`PropertyListHelper`](), like menu items, are now automatically documented. Before, property arrays wouldn’t show descriptions when hovered over in the inspector. In Godot 4.7, documentation for properties are automatically generated and viewable when hovered.
  read_more: "https://github.com/godotengine/godot/pull/115253"
  contributors:
    - name: "bruvzg"
      link: "https://github.com/bruvzg"
  media_author:
    name: "bruvzg"
    link: "https://github.com/bruvzg"
  media: property_list_helper_documentation.webp
project_version_discrepancies:
  title: "The Project Manager now depicts version discrepancies"
  subtitle: "Have you made a decision about upgrading? Ready to move forward into comfort and luxury?"
  text: |
    While the project manager already displayed the engine version used by each project, it did not show an explicit indication that a project had to be upgraded (or downgraded) before it could be opened by the current editor version.

    Thanks to this addition, an “upgrade” or “downgrade” icon is now displayed next to the version number if a project must be upgraded or downgraded before being opened. A different icon is also used for major version upgrades (i.e. opening a Godot 3 project in Godot 4).
  read_more: "https://github.com/godotengine/godot/pull/111528"
  contributors:
    - name: "Malcolm Anderson"
      link: "https://github.com/Meorge"
  media_author:
    name: "Malcolm Anderson"
    link: "https://github.com/Meorge"
  media: project_version_discrepancies.webm
  poster: project_version_discrepancies_poster.webp
input_events_device_ids:
  title: "Identify distinct keyboards and mice"
  subtitle: "BIG GODOT IS WATCHING YOU… keyboards and mice."
  text: |
    Like gamepad inputs, keyboard and mouse inputs now use a device identifier. This can be used to distinguish keyboard/mouse inputs from other inputs by checking for the [`InputEvent`](https://docs.godotengine.org/en/4.7/classes/class_inputevent.html)’s `device` property. Keyboard inputs always have their device ID set to [`InputEvent.DEVICE_ID_KEYBOARD`](https://docs.godotengine.org/en/latest/classes/class_inputevent.html#class-inputevent-constant-device-id-keyboard), while mouse inputs have it set to [`InputEvent.DEVICE_ID_MOUSE`](https://docs.godotengine.org/en/latest/classes/class_inputevent.html#class-inputevent-constant-device-id-mouse).

    While this change does not add support for differentiating between multiple keyboards/mice connected to the same system, it lays a foundation that makes this possible to implement in the future.
  read_more: "https://github.com/godotengine/godot/pull/116274"
  contributors:
    - name: "Nintorch"
      link: "https://github.com/Nintorch"
  media: input_events_device_ids.webp
create_node_type_filter:
  title: "Find quickly the node or resource to create with the new dialog filters"
  subtitle: "Cream of the crop."
  text: |
    When opening the create dialog for a node or a resource in 4.7, you’ll be able to filter the elements shown in the tree.

    Want to instantiate something from your code? No problem, make sure “Show Custom” is the only checkbox selected in the new option menu, just underneath the favorite button.
  read_more: "https://github.com/godotengine/godot/pull/111518"
  contributors:
    - name: "Tomasz Chabora"
      link: "https://github.com/KoBeWi"
  media_author:
    name: "Tomasz Chabora"
    link: "https://github.com/KoBeWi"
  media: create_node_type_filter.webm
  poster: create_node_type_filter_poster.webp
ios_sdl3:
  title: "Better controller support on iOS"
  subtitle: "A true controller know-it-all."
  text: |
    One of Godot’s strengths is cross-platform controller support. However, given the large number of controllers out there, issues with incorrect mappings or non-working functionality inevitably crop up. So far, the best way to improve controller reliability has been to switch to [SDL3 library](https://www.libsdl.org/) for input, as done on Windows, macOS, and Linux already.

    By switching to the battle-tested [SDL3 library](https://wiki.libsdl.org/SDL3/FrontPage) on iOS, this fixes several issues related to controllers not being recognized properly on that platform.
  read_more: "https://github.com/godotengine/godot/pull/114316"
  contributors:
    - name: "Nintorch"
      link: "https://github.com/Nintorch"
  media: ios_sdl3.webp
joypad_motion_sensors:
  title: "Add gyro aiming support to your project!"
  subtitle: "Aim for the open spot!"
  text: |
    This long-awaited feature makes it possible to read accelerometer and gyroscope inputs from controllers that feature the necessary hardware. This allows for the implementation of *gyro aiming* in Godot projects, which makes for responsive yet smooth aiming by tilting the controller.
  read_more: "https://github.com/godotengine/godot/pull/111679"
  contributors:
    - name: "Nintorch"
      link: "https://github.com/Nintorch"
  media: joypad_motion_sensors.webp
accessibility_region:
  title: "Landmark navigation for enhanced accessibility"
  subtitle: "You are here. 👇"
  text: |
    A new feature has been introduced in order to make the engine more accessible to both editor and end users.

    The focused element of a user interface can frequently move in arbitrary ways. While we introduced screen reader support in 4.5, it lacked the ability to give context in some cases. While a line input could be set to describe a “name” field, it doesn’t help if you don’t know what it named.

    By introducing landmark navigation, the screen reader can give some context information once you enter the perimeter of a landmark, such as telling the screen reader user that the focus is currently in the inspector, on the name field.
  read_more: "https://github.com/godotengine/godot/pull/114449"
  contributors:
    - name: "Nolan Darilek"
      link: "https://github.com/ndarilek"
  media: accessibility_region.webp
pass_unique_buffer:
  title: "Giving every pass its own unique environment uniform buffer"
  subtitle: "You get a buffer! And you! Everyone gets a buffer!"
  text: |
    A small performance gain for projects that use the Forward+ renderer without having to do anything! Talk about a great deal.

    Modern rendering uses what we call “passes” in order to create final images that are shown on your screen. These are essentially processes that end up with a painted canvas. Some passes can draw the scene objects, while others can read the output of previous passes in order to apply some post-processing effects.

    We figured out that by giving each pass their own unique environment uniform memory pool, we could speed up the rendering process. It’s all because sharing the same memory pool across passes added copy dependencies that often bottlenecked the whole process. As GPUs are meant to multiple tasks in parallel, it checks out.
  read_more: "https://github.com/godotengine/godot/pull/115177"
  contributors:
    - name: "Skyth"
      link: "https://github.com/blueskythlikesclouds"
  media: pass_unique_buffer.webp
mono_font_code_names:
  title: "Method, signals, and properties now use a monospaced font"
  subtitle: "It feels like home."
  text: |
    The script editor uses a monospace font by default. In other words, every character occupies the same width, which makes it easier to compare lines of code visually.

    However, until now, the editor did not use a monospace font in locations where it displays names of methods, signals, and properties that come from scripts. This led to a visual discrepancy between what you see in the script editor and what you see elsewhere in the editor, when names coming from the scripts are visible.

    The previous behavior can still be obtained by disabling the **Interface > Theme Use Monospace Font for Editor Symbols** editor setting.
  read_more: "https://github.com/godotengine/godot/pull/112219"
  contributors:
    - name: "Malcolm Anderson"
      link: "https://github.com/Meorge"
  media_author:
    name: "Malcolm Anderson"
    link: "https://github.com/Meorge"
  media: mono_font_code_names.webp
navigate_to_script:
  title: "Reveal the current script in the list"
  subtitle: "I believe in the heart of the scripts… I will then summon the current one in attack mode!"
  text: |
    When working with a lot of open scripts, it can be challenging to find the script you’re currently working on in the list of scripts. To make this easier, you can now double-click the name of the current script at the top of the script editor to reveal the script in the list.
  read_more: "https://github.com/godotengine/godot/pull/112796"
  contributors:
    - name: "Jin Yang"
      link: "https://github.com/jinyangcruise"
  media_author:
    name: "Jin Yang"
    link: "https://github.com/jinyangcruise"
  media: navigate_to_script.webm
  poster: navigate_to_script_poster.webp
conic_gradient:
  title: "`GradientTexture2D` now able to generate conic gradients"
  subtitle: "POV: You just drew the Wheel of Fortune card"
  text: |
    [`FILL_CONIC`](https://docs.godotengine.org/en/4.7/classes/class_gradienttexture2d.html#class-gradienttexture2d-constant-fill-conic) was newly added to [`GradientTexture2D`](https://docs.godotengine.org/en/4.7/classes/class_gradienttexture2d.html), enabling the use of CSS-style effects. This is particularly useful in custom 2D shaders to simulate surfaces with realistic 3D-like shading.
  read_more: "https://github.com/godotengine/godot/pull/115394"
  contributors:
    - name: "Koliur Rahman"
      link: "https://github.com/dugramen"
  media: conic_gradient.webp
tiling_atlas_texture:
  title: "Tile `AtlasTextures` in `TextureRect` nodes"
  subtitle: "Enhance 224 to 176. Enhance. Stop. Move in. Stop. Pull back. Wait a minute. Gimme a tiled copy right there."
  text: |
    [`AtlasTexture`](https://docs.godotengine.org/en/4.7/classes/class_atlastexture.html) allows making use of a specific *region* of a texture to be drawn in 2D. This can improve performance on low-end devices by reducing texture changes, but also makes it easier to organize assets by having fewer files lying around in the project directory. However, `AtlasTexture` requires specific support in each node that wishes to make use of it.

    Support for `AtlasTexture` is now available in [`TextureRect`](https://docs.godotengine.org/en/4.7/classes/class_texturerect.html), which can draw part of an `AtlasTexture` as a repeating texture for use in nine-patch texturing.
  read_more: "https://github.com/godotengine/godot/pull/113808"
  contributors:
    - name: "Kleonc"
      link: "https://github.com/kleonc"
  media: tiling_atlas_texture.webp
follow_selection:
  title: "Follow moving objects in the 3D editor"
  subtitle: "Taxi! Follow that node!"
  text: |
    By pressing the Focus Selection shortcut (<kbd><kbd>F</kbd></kbd> by default) *twice*, you can make the 3D editor automatically follow an object as it’s moved. This is especially useful when previewing how lighting affects an object as it moves across the scene, such as when using [`LightmapGI`](https://docs.godotengine.org/en/4.7/classes/class_lightmapgi.html) with dynamic objects.

    You can still transform the object using the mouse or Blender-style manipulation shortcuts while in follow mode. This also works when playing an animation using an [`AnimationPlayer`](https://docs.godotengine.org/en/4.7/classes/class_animationplayer.html) node, or moving a node using a `@tool` script.
  read_more: "https://github.com/godotengine/godot/pull/99499"
  contributors:
    - name: "Hugo Locurcio"
      link: "https://github.com/Calinou"
  media_author:
    name: "Charles Boury"
    link: "https://bsky.app/profile/charlesboury.fr"
  media: follow_selection.webm
  poster: follow_selection_poster.webp
view_3d_controller:
  title: "Unified editor 3D view manipulation"
  subtitle: "We are the `View3DController`. Resistance is futile."
  text: |
    The 3D camera controllers for the editor and [game embedding](https://docs.godotengine.org/en/4.7/tutorials/editor/game_embedding.html) are now unified.

    This adds support for several features in the 3D camera override when using game embedding:

      - Configurable shortcuts for view manipulation (as set in the editor settings).
      - Use of the navigation scheme configured in the editor settings.
      - Camera snapping when orbiting (hold <kbd><kbd>Alt</kbd></kbd> and drag the middle mouse button).
      - Orbit, panning, and freelook inertia, if enabled in the editor settings.
  read_more: "https://github.com/godotengine/godot/pull/115957"
  contributors:
    - name: "Michael Alexsander"
      link: "https://github.com/YeldhamDev"
  media: view_3d_controller.webp
# gradle_plugins_support:
#   title: "Feature Title"
#   subtitle: "Feature Tagline"
#   text: "Feature Content"
#   read_more: "https://github.com/godotengine/godot/pull/115888"
#   contributors:
#     - name: "Fredia Huya-Kouadio"
#       link: "https://github.com/m4gr3d"
# media: gradle_plugin.webp
csg_smoothing:
  title: "Automatic smoothing option for CSG nodes"
  subtitle: "You’ve been hit by… a smooth Cs’G node"
  text: |
    When creating geometry with CSG nodes, it inherits the smooth/sharp faces from the original mesh data. This is not always suitable, as it can lead to curves being made of sharp faces depending on how they were constructed using CSG nodes.

    Enabling the new **Autosmooth** property on a root CSG node will automatically assign smooth or sharp faces according to the **Smoothing Angle** property (which defaults to 50 degrees). Higher values will smooth faces more aggressively.
  read_more: "https://github.com/godotengine/godot/pull/116749"
  contributors:
    - name: "Jesusemora"
      link: "https://github.com/Jesusemora"
  media_author:
    name: "Jesusemora"
    link: "https://github.com/Jesusemora"
  media: csg_smoothing.webp
gdscript_java_interfaces:
  title: "Allow implementing Java interfaces from GDScript"
  subtitle: "😂😂😂😀😶😯🤯"
  text: |
    The Android team continues their work to facilitate integration and access of Android APIs in GDScript through [JavaClassWrapper and the AndroidRuntime plugin](https://docs.godotengine.org/en/latest/tutorials/platform/android/javaclasswrapper_and_androidruntimeplugin.html).

    In Godot 4.7, these capabilities have been expanded by adding support for implementing and overriding Java interfaces in GDScript.
  read_more: "https://github.com/godotengine/godot/pull/115498"
  contributors:
    - name: "Fredia Huya-Kouadio"
      link: "https://github.com/m4gr3d"
  media: gdscript_java_interfaces.webp
custom_splash_screen:
  title: "Easily customizable splash screens"
  subtitle: "Take them to the next level."
  text: |
    It was previously possible to customize the native Android splash screen of your game, but it required a Gradle build and manually installing files inside the native Android resources.

    You are now able to edit the splash screen settings in the Android export options.
  read_more: "https://github.com/godotengine/godot/pull/114671"
  contributors:
    - name: "Anish Kumar"
      link: "https://github.com/syntaxerror247"
  media: custom_splash_screen.webp
script_editor_orientation_change:
  title: "Enable orientation change in Script Editor"
  subtitle: "Code layered down in your bed or in the bus."
  text: |
    One of the main usability issues of the Android Editor is script editing. While many improvements in this area are currently in progress, we’ve addressed one big issue: the fact that the on-screen keyboard takes up a large portion of the available screen space on mobile, making it difficult to work with code.

    We’ve enabled changing the orientation for the Script editor. When it’s in expanded mode, you can now rotate your device to switch between portrait and landscape orientation.

    Many developers prefer coding in portrait mode, as it provides more vertical space and allows more lines to be visible at once. This makes navigating, reading, and writing scripts much more comfortable on mobile.
  read_more: "https://github.com/godotengine/godot/pull/117109"
  contributors:
    - name: "Anish Kumar"
      link: "https://github.com/syntaxerror247"
  media_author:
    - name: "Anish Kumar"
      link: "https://github.com/syntaxerror247"
  media: script_editor_orientation_change.webm
  poster: script_editor_orientation_change_poster.webp
perfetto_tracing:
  title: "Making tracing easier with Perfetto"
  subtitle: "I want to know everything there is to know about Spider-Android!!"
  text: |
    In Godot 4.7, we are making Perfetto the default tracing tool for Android editor and template builds.

    For template builds, this allows developers to leverage Android’s built-in Perfetto integration to easily analyze the performance of their games and apps.

    For editor builds, this gives us, the Godot Android maintainers, the tools to analyze and address performance issues with the Godot editor on Android devices.

    [Read more in the documentation.](https://docs.godotengine.org/en/stable/engine_details/development/profiling/perfetto.html)
  read_more: "https://github.com/godotengine/godot/pulls?q=is%253Apr+is%253Amerged+118401+118503"
  contributors:
    - name: "Fredia Huya-Kouadio"
      link: "https://github.com/m4gr3d"
  media: perfetto_tracing.webp
vulkan_subsampled_images:
  title: "Vulkan subsampled images"
  subtitle: "Live long and subsample."
  text: |
    This feature dramatically improves performance of foveated rendering in the Vulkan Mobile render.

    This works by storing rendered tiles at their reduced resolution with interpolation being applied when sampling the resulting subimage, greatly decreasing memory bandwidth. Without subsampled images, foveated rendering will upscales these tiles to the full resolution when writing to texture memory.

    With this change the Vulkan mobile renderer matches or even outperforms our compatibility renderer in a number of benchmarks. As a result we now recommend new XR projects use the mobile renderer.
  read_more: "https://github.com/godotengine/godot/pull/116220"
  contributors:
    - name: "David Snopek"
      link: "https://github.com/dsnopek"
action_map_improvements:
  title: "Action maps have been simplified"
  subtitle: "“*Le contrôleur!?* What the hell is that!” no more."
  text: |
    With the introduction of support for the [OpenXR generic controller profile](https://registry.khronos.org/OpenXR/specs/1.1/html/xrspec.html#XR_KHR_generic_controller), the default [action map](https://docs.godotengine.org/en/4.7/tutorials/xr/xr_action_map.html) for new OpenXR projects has been greatly simplified.

    From more than 10 profiles, the default action map has been simplified to only contain entries for the generic controller profile, touch controller profile, Pico 4 controller profile, and hand interaction profile.

    Developers can introduce additional profiles if their target platforms require those but with just these 4 defaults, the action map is far more manageable, while still covering most of the market.
  read_more: "https://github.com/godotengine/godot/pulls?q=is%253Apr+is%253Amerged+110778+118975"
  contributors:
    - name: "Bastiaan Olij"
      link: "https://github.com/BastiaanOlij"
    - name: "Logan Lang"
      link: "https://github.com/devloglogan"
  media: "action_map_improvements.webp"
composition_layer_improvements:
  title: "Composition layer improvements"
  subtitle: "Check this out."
  text: |
    There are a number of improvements to the OpenXR composition layer system to give more control over how these are presented to the user.

    Noteworthy improvements here are:

      - Place composition layers under the [`XRCamera3D`](https://docs.godotengine.org/en/4.7/classes/class_xrcamera3d.html) node so they are locked in the players view, ideal for head up displays.
      - The ability to place composition layer objects anywhere within your scene so they can be paired with world geometry.
      - Allowing plugins to affect the main projection layer.
  read_more: "https://github.com/godotengine/godot/pulls?q=is%253Apr+is%253Amerged+113096+114324+116207"
  contributors:
    - name: "stillmant"
      link: "https://github.com/stillmant"
    - name: "Fredia Huya-Kouadio"
      link: "https://github.com/m4gr3d"
    - name: "eritschlSC"
      link: "https://github.com/eritschlSC"
3d_transform_gizmo_trackball:
  title: "Rotate 3D nodes intuitively with trackball-style rotation"
  subtitle: "Look at that. Not bad at all. A big trackball indeed. ✨&#x2060;🌌&#x2060;🟪&#x2060;🤴&#x2060;🟪&#x2060;🌌&#x2060;✨"
  text: |
    We've added a new way to rotate 3D nodes.

    First of all, be sure to activate **Use Trackball** (the new planet looking icon, or just press <kbd><kbd>U</kbd></kbd>) in the 3D editor toolbar. When the transform or rotation gizmo is active, you'll see that a translucent sphere will appear when hovering your mouse cursor inside the gizmo. If you click on that sphere and drag, you'll rotate the model as if you were using a genuine trackball. 

    The 3D transform gizmo now more closely behaves like the one used in Blender.
  read_more: "https://github.com/godotengine/godot/pull/109976"
  contributors:
    - name: "Charles Boury"
      link: "https://github.com/CharlesBoury"
  media_author:
    name: "Charles Boury"
    link: "https://bsky.app/profile/charlesboury.fr"
  media: "3d_transform_gizmo_trackball.webm"
  poster: "3d_transform_gizmo_trackball_poster.webp"
