day_one_xr_support:
  title: "Day one support for the latest XR platforms"
  subtitle: "It means buckle your seatbelt, Dorothy, ’cause Kansas is going bye-bye"
  text: |
    Godot continues the trend of being one of the best engines for XR development, with Godot 4.7 adding day one production-ready support for [Android XR](https://www.android.com/xr/) and [Steam Frame](https://store.steampowered.com/sale/steamframe).

    In collaboration [with Google](https://android-developers.googleblog.com/2026/05/android-xr-updates-unity-unreal-godot.html), the Godot XR team has delivered [a plethora of new features](https://godotengine.org/article/godot-xr-update-may-2026/#android-xr) designed to provide developers access to the latest and greatest Android XR features.

    Godot 4.7 is also production-ready for the Steam Frame, planned to release this summer.

    From building a brand-new XR game, to porting an existing 3D or XR game, Godot 4.7 provides you with the best tools for the job.

    <div style="margin-top: 2rem" markdown=1>
      [Learn more about how to develop for Android XR](https://developer.android.com/develop/xr/godot)<br>
      [Learn more about how to develop for Steam Frame](https://partner.steamgames.com/doc/steamhardware/steamframe/engines/godot)
    </div>
